        <main>
            <section class="calculadora">
                <h3>Simulador de Pontos</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="">Arroz(5kg) - 10 pts</label>
                        <input type="number" id="qtdArroz" min="0">
                     </div>
                     <div class="form-group">
                        <label for="">Feijão(2kg) - 8 pts</label><!--rotulo da caia de entrada-->
                        <input type="number" id="qtdFeijao" min="0"><!--caixa de entrada-->
                     </div>
                     <div class="form-group">
                        <label for="">Óleo(900ml) - 4 pts</label>
                        <input type="number" id="qtdOleo" min="0">
                     </div>
                     <div class="form-group">
                        <label for="">Macarrão(500g) - 2 pts</label>
                        <input type="number" id="qtdmaca" min="0">
                     </div>
                </div>
                <button onclick="calcular()">Calcular Total da Equipe</button>
                <div id="resultado"  class="resultado-box">
                    Pontuação Total:0 pontos
                </div>
            </section>
        </main>
         <footer>
            <p>Coordenação Trote Solidário 2026: trotesolidario@facef.br</p>
